name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pdf]"

      - name: Lint (ruff)
        run: ruff check ariadne/ tests/

      - name: Test (pytest, offline) with coverage
        run: pytest -q --cov=ariadne --cov-report=term-missing

  package:
    # A 1.0 must build a clean, installable distribution and expose its CLI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate distribution metadata
        run: twine check dist/*
      - name: Install the wheel and smoke-test the CLI
        run: |
          python -m pip install dist/*.whl
          ariadne --version

  docker:
    # Prove the container image builds (it could not be verified on the dev box).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ariadne:ci .
